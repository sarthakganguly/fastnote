services:
  proxy:
    image: nginx:alpine
    container_name: fastnote-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: fastnote-backend
    env_file:
      - ./backend/.env
    # FIX 1: Explicitly set DNS to bypass local resolution issues
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - sqlite_data:/app/data
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////app/data/fastnote.db
      - SECRET_KEY=${SECRET_KEY:-generate_a_very_secure_random_key_here}
      - LOG_LEVEL=INFO
      # FIX 2: Tell Dodo where to redirect your browser after checkout
      - FRONTEND_URL=https://2a43-103-215-237-93.ngrok-free.app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: fastnote-frontend
    environment:
      - REACT_APP_API_BASE_URL=/
      - WDS_SOCKET_PORT=0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
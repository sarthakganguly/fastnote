services:
  # NEW: The reverse proxy handles all incoming traffic
  proxy:
    image: nginx:alpine
    container_name: fastnote-proxy
    ports:
      - "80:80"  # Expose port 80 to your host machine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    # REMOVED: ports: - "5000:5000" (Now only accessible inside the Docker network)
    volumes:
      - sqlite_data:/app/data
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////app/data/fastnote.db
      - SECRET_KEY=${SECRET_KEY:-generate_a_very_secure_random_key_here}
      - LOG_LEVEL=INFO
    container_name: fastnote-backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      # 1. Force relative routing to bypass any hardcoded :5000 fallbacks
      - REACT_APP_API_BASE_URL=/
      # 2. Tell the React Dev Server to use the proxy's port (80) for WebSockets
      - WDS_SOCKET_PORT=0
    container_name: fastnote-frontend
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
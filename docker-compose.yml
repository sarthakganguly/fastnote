services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - sqlite_data:/app/data
    environment:
      # Production overrides ensuring secure execution bounds
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////app/data/fastnote.db
      - SECRET_KEY=${SECRET_KEY:-generate_a_very_secure_random_key_here}
      - LOG_LEVEL=INFO
    container_name: fastnote-backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE_URL=http://192.168.1.100:5000
    container_name: fastnote-frontend
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data: